---
# LLM Stack – Kubernetes Serving Deployment
# Deploys the vLLM/FastAPI serving service with GPU support.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-serving
  namespace: llm-stack
  labels:
    app: llm-stack
    component: serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-stack
      component: serving
  template:
    metadata:
      labels:
        app: llm-stack
        component: serving
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: serving
          image: ${REGISTRY}/llm-stack-serving:${IMAGE_TAG:-latest}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8090
              name: metrics
          env:
            - name: MODEL_PATH
              value: "/models/pretrain/final"
            - name: USE_VLLM
              value: "true"
            - name: DTYPE
              value: "bfloat16"
            - name: MAX_SEQ_LEN
              value: "512"
            - name: GPU_MEM_UTIL
              value: "0.85"
            - name: JSON_LOGS
              value: "true"
            - name: ENVIRONMENT
              value: "production"
            - name: MODEL_VERSION
              valueFrom:
                configMapKeyRef:
                  name: llm-stack-config
                  key: model_version
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "12Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: llm-checkpoints-pvc
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      nodeSelector:
        accelerator: nvidia-gpu

---
apiVersion: v1
kind: Service
metadata:
  name: llm-serving
  namespace: llm-stack
  labels:
    app: llm-stack
    component: serving
spec:
  type: ClusterIP
  selector:
    app: llm-stack
    component: serving
  ports:
    - name: http
      port: 80
      targetPort: 8000
    - name: metrics
      port: 8090
      targetPort: 8090

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llm-checkpoints-pvc
  namespace: llm-stack
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard-ssd
  resources:
    requests:
      storage: 50Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llm-data-cache-pvc
  namespace: llm-stack
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard-ssd
  resources:
    requests:
      storage: 20Gi
