# LoRA fine-tuning configuration

defaults:
  - model

lora:
  output_dir: ./checkpoints/lora
  base_model_path: ./checkpoints/sft/best

  # LoRA hyperparameters
  r: 16
  lora_alpha: 32.0
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  bias: none

  # QLoRA (optional 4-bit quantisation)
  use_4bit: false
  bnb_4bit_compute_dtype: bfloat16

  max_steps: 2000
  eval_interval: 200
  save_interval: 500
  log_interval: 10

  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 100
  grad_clip: 1.0

  batch_size: 4
  gradient_accumulation_steps: 8

  dtype: bfloat16
  gradient_checkpointing: true

data:
  train_path: ./data/sft_train.jsonl
  val_path: ./data/sft_val.jsonl
  max_seq_len: 512
