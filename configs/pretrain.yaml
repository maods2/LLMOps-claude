# Pretraining configuration
# Designed for 8GB VRAM with ~302M parameter model.
#
# Effective batch size = batch_size × gradient_accumulation_steps = 8 × 8 = 64

defaults:
  - model

pretrain:
  output_dir: ./checkpoints/pretrain
  resume_from: null

  # Training
  max_steps: 100000
  eval_interval: 2000
  save_interval: 5000
  log_interval: 10

  # Optimiser
  learning_rate: 3.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 2000

  # Batch (8GB-safe settings)
  batch_size: 8
  gradient_accumulation_steps: 8   # Effective batch = 64

  # Precision
  dtype: bfloat16                  # BF16 recommended on Ampere+
  gradient_checkpointing: true

data:
  sources:
    - name: wikitext2
      split: train
      streaming: true
    - name: tinystories
      split: train
      streaming: true
      subset_size: 50000
  val_sources:
    - name: wikitext2
      split: validation
      streaming: false
  max_seq_len: 512
  num_workers: 4
  cache_dir: ./data_cache
  seed: 42
